<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log In — Nexum Ops</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a class="logo" href="index.html"><div class="logo-mark">N</div>NEXUM <span>OPS</span></a>
    <nav class="nav-links">
      <a href="index.html#features">Features</a>
      <a href="index.html#integrations">Integrations</a>
      <a href="index.html#industries">Industries</a>
      <a href="index.html#pricing">Pricing</a>
    </nav>
    <div class="nav-links">
      <a class="active" href="login.html">Log in</a>
      <a class="btn" href="index.html#demo">Book a Demo</a>
    </div>
  </div>
</header>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">N</div>NEXUM <span>OPS</span>
    </div>
    <h2>Welcome back</h2>
    <p class="subtitle">Log in to your Nexum Ops account.</p>
    <form class="login-form" onsubmit="return false;">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="you@company.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <a class="forgot-link" href="#">Forgot your password?</a>
      <button class="btn" type="submit" style="width:100%;justify-content:center;border:none;cursor:pointer;font-size:15px;margin-top:8px">Log In</button>
    </form>
    <p class="login-footer-text">Don't have an account? <a href="index.html#demo">Book a demo</a></p>
  </div>
</div>

<footer class="footer">
  <div class="container footer-inner">
    <a class="logo" href="index.html"><div class="logo-mark">N</div>NEXUM <span>OPS</span></a>
    <div class="footer-links">
      <a href="index.html#features">Features</a>
      <a href="index.html#integrations">Integrations</a>
      <a href="index.html#pricing">Pricing</a>
    </div>
    <div>© 2026 Nexum Ops. All rights reserved.</div>
  </div>
</footer>

</body>
</html>
